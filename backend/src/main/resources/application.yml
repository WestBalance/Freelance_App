server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/tasklink
    username: tasklink
    password: tasklink
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  flyway:
    enabled: false

logging:
  level:
    org.hibernate.SQL: info


stripe:
  secret-key: ${STRIPE_SECRET_KEY:}
  api-base-url: ${STRIPE_API_BASE_URL:https://api.stripe.com/v1}
