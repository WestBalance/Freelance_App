server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/tasklink
    username: tasklink
    password: tasklink
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  flyway:
    enabled: false

logging:
  level:
    org.hibernate.SQL: info
